<html lang="es">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">

        <div class="container">

            <a class="navbar-brand fw-bold" href="index.html">
                🍔 FoodExpress
            </a>

            <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse" id="navbarNav">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="index.html">
                            Inicio
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="menu.html">
                            Menú API
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="promociones.html">
                            Promociones
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="carrito.html">
                            Carrito
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="nosotros.html">
                            Nosotros
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link active" href="contacto.html">
                            Contacto
                        </a>
                    </li>

                </ul>

                <button id="darkModeBtn" class="btn btn-warning ms-3">
                    🌙
                </button>

            </div>

        </div>

    </nav>

<section class="container py-5">

    <h1 class="text-center mb-5">
        📩 Contáctanos
    </h1>

    <div class="row justify-content-center">

        <div class="col-md-8">

            <form id="formContacto" class="card shadow p-4">

                <div class="mb-3">
                    <label class="form-label">Nombre</label>

                    <input
                        type="text"
                        id="nombre"
                        class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">Correo</label>

                    <input
                        type="email"
                        id="correo"
                        class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">Mensaje</label>

                    <textarea
                        id="mensaje"
                        rows="5"
                        class="form-control"></textarea>
                </div>

                <button class="btn btn-warning">
                    Enviar Mensaje
                </button>

            </form>

            <div
                id="resultado"
                class="mt-4">
            </div>

        </div>

    </div>

</section>

<footer class="bg-black text-white text-center p-4">

    <h5>FoodExpress © 2026</h5>

    <p>
        Proyecto desarrollado para Programación Web
    </p>

</footer>

<script src="js/app.js"></script>
